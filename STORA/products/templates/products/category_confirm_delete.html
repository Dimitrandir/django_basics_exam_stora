{% extends 'base.html' %}

{% block content %}

<h1>Are you sure you want to delete category: "{{ category.name }}"?</h1>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="delete_button">YES</button>
    <a href="{% url 'category_list' %}" class="button_cancel">NO</a>
</form>

{% endblock %}
