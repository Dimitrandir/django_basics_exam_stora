{% extends 'base.html' %}

{% block content %}

<h1>Categories List</h1>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th><a href="{% url 'category_create' %}" class="add-btn-table" title="Add a new category">+</a></th>
        </tr>
    </thead>
    <tbody>
        {% for category in categories %}
        <tr>
            <td>{{ category.name }}</td>
            <td>{{ category.description }}</td>
            <td>
                <a href="{% url 'category_edit' category.pk %}">Edit</a>
                |
                <a href="{% url 'category_delete' category.pk %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No categories found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
