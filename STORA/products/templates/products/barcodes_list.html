<h2>Barcode List for product: {{ product.name }}</h2>

<a href="{% url 'product_edit' product.pk %}" class="btn">Back to Product Edit</a>
    <hr>

    <table border="1" style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th style="padding: 10px;">Barcode Number</th>
                <th style="padding: 10px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for bc in barcodes %}
                <tr>
                    <td style="padding: 10px;">{{ bc.code }}</td>
                    <td style="padding: 10px;">
                        <button>Edit</button>
                        <button>Edit</button>
                        <button>Add New</button>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3" style="padding: 10px; text-align: center;">
                        No barcodes found.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
