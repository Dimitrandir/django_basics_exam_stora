{% extends 'base.html' %}

{% block content %}

    <h1>Add new product</h1>
    {% if form.errors %}
    <div style="color: red;">
        <strong>Please correct these errors:</strong>
        {{ form.errors }}
    </div>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
    <hr>
    <a href="{% url 'product_list' %}">Cancel</a>

{% endblock %}
