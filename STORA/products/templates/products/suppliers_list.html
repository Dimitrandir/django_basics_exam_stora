{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">Suppliers List</h1>
        <p class="text-muted mb-0">Overview of all registered suppliers.</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>BULSTAT</th>
            <th>VAT Number</th>
            <th>
                <a href="{% url 'suppliers_create' %}" class="add-btn-table" title="New Supplier">+</a>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for supplier in suppliers %}
        <tr>
            <td>{{ supplier.name }}</td>
            <td>{{ supplier.bulstat }}</td>
            <td>{{ supplier.vat_n }}</td>
            <td>
                <a href="{% url 'suppliers_edit' supplier.pk %}" title="View supplier">
                    <img src="{% static 'visibility.png' %}" alt="View" style="width:24px;height:24px;max-width:24px;max-height:24px;object-fit:contain;">
                </a>
            </td>
        </tr>
        <tr>
            {% empty %}
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
