{% extends 'base.html' %}

{% block content %}

<h1>Are you sure you want to delete:
    "{{ product.name }}"?</h1>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="delete_button">YES</button>
    <a href="{% url 'product_list' %}" class="button_cancel">NO</a>

</form>


{% endblock %}
