{% extends 'base.html' %}

{% block content %}

<h1>Are you sure you want to delete Sale ID: {{ sale.id }} of {{ sale.time_of_sale | date:"d.m.Y H:i"}}</h1>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="delete_button">YES</button>
    <a href="{% url 'sales_list' %}" class="button_cancel">NO</a>
</form>

{% endblock %}
