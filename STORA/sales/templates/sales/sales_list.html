{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h2 mb-1">Sales List</h1>
        <p class="text-muted mb-0">Overview of all completed sales.</p>
    </div>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Time</th>
            <th>Amount</th>
            <th>
                <a href="{% url 'sale_add' %}" class="add-btn-table" title="New Sale">+</a>
            </th>
        </tr>
    </thead>
    <tbody>
        {% for sale in sales %}
        <tr>
            <td>{{ sale.id }}</td>
            <td>{{ sale.time_of_sale|date:"d.m.Y H:i" }}</td>
            <td>{{ sale.total_amount }}</td>
            <td>
                <a href="{% url 'sale_details' sale.pk %}" title="View sale">
                    <img src="{% static 'visibility.png' %}" alt="View" style="width:24px;height:24px;max-width:24px;max-height:24px;object-fit:contain;">
                </a>
            </td>
        </tr>
        <tr>
            {% empty %}
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
