{% extends 'base.html' %}

{% block content %}
<h1>Register</h1>

{% if form.errors %}
<div style="color: red;">
    <strong>Please correct these errors:</strong>
    {{ form.errors }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

<hr>
<a href="{% url 'login' %}">Already have an account? Login</a>
{% endblock %}
