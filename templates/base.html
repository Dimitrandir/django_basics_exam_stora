{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stora System</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'index' %}">🏠 Home</a>
        <a href="{% url 'product_list' %}">📦 Products</a>
        <a href="{% url 'category_list' %}">🏷️ Categories</a>
        <a href="{% url 'suppliers_list' %}">🚚 Suppliers</a>
        <a href="{% url 'employee_list' %}">👥 Employees</a>
        <a href="{% url 'sales_list' %}">💰 Sales</a>

        {% if user.is_authenticated %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer style="text-align: center; margin-top: 50px; color: #7f8c8d;">
        <p>&copy; 2026 STORA Inventory System</p>
    </footer>
</body>
</html>
