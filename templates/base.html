{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORA System</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'product_list' %}">Products</a>
            <a href="{% url 'category_list' %}">Categories</a>
            <a href="{% url 'suppliers_list' %}">Suppliers</a>
            <a href="{% url 'deliveries_list' %}">Deliveries</a>
            <a href="{% url 'sales_list' %}">Sales</a>
            <a href="{% url 'reports_dashboard' %}">Reports</a>
            <a href="{% url 'employee_list' %}">Employees</a>

            {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}" class="logout-form">
                    {% csrf_token %}
                    <button type="submit">Logout {{ user.username }}</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main class="site-main">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 STORA Inventory System</p>
    </footer>
</body>
</html>
